AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Deploys a single EC2 instance from a custom AMI for running a persistent Python WebSocket consumer (e.g., Coinbase -> Kinesis).
  Uses minimal configuration: private subnet recommended, outbound-only access.

Parameters:
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: The ID of your AMI
  InstanceType:
    Type: String
    Default: t4g.nano
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t3.nano
      - t3.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The ID of the subnet to launch the instance in (use a private subnet for security)
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group ID for the Instance
  IamInstanceProfile:
    Type: String
    Description: Name of the IAM instance profile/role (must allow Kinesis:PutRecord*, logs, etc.)
    Default: ""
  CoinbaseProductId:
    Type: String
    Default: BTC-USD
    AllowedValues:
      - BTC-USD
      - ETH-USD
      - LTC-USD
    Description: Coinbase Product ID to stream from

Conditions:
  HasKeyName: !Not [ !Equals [!Ref KeyName, ""] ]
  HasInstanceProfile: !Not [ !Equals [!Ref IamInstanceProfile, ""] ]

Resources:
  ConsumerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      IamInstanceProfile: !If [HasInstanceProfile, !Ref IamInstanceProfile, !Ref "AWS::NoValue"]
      Monitoring: false
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash

          dnf update -y
          dnf install -y python3.12 python3.12-pip python3.12-devel

          PYTHON=/usr/bin/python3.12
          PIP=/usr/bin/pip3.12
          SCRIPT_PATH=/root/websocket_script_coinbase.py

          aws s3 cp s3://greatestbucketever/websocket_folder/websocket_script_coinbase.py $SCRIPT_PATH
          $PIP install boto3==1.42.67 websockets==16.0   # lock versions for stability

          cat > /etc/systemd/system/coinbase_websocket.service << EOL
          [Unit]
          Description=Coinbase Websocket Script
          StartLimitIntervalSec=0

          [Service]
          User=root
          Type=simple
          Restart=always
          RestartSec=1
          ExecStart=$PYTHON $SCRIPT_PATH ${CoinbaseProductId}

          [Install]
          WantedBy=multi-user.target
          EOL

          systemctl daemon-reload
          systemctl enable coinbase_websocket.service
          sleep 3
          systemctl restart coinbase_websocket.service
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow

Outputs:
  InstanceId:
    Description: The instance ID of the launched EC2 instance
    Value: !Ref ConsumerInstance
  PrivateIp:
    Description: Private IP address of the instance
    Value: !GetAtt ConsumerInstance.PrivateIp
  AvailabilityZone:
    Description: AZ where the instance launched
    Value: !GetAtt ConsumerInstance.AvailabilityZone
